name: deploy

#监听push操作
on:
  push:
    branches:
      - cicd # 这里只配置了cicd分支，所以只有推送cicd分支才会触发以下任务
    paths-ignore: # 下列文件的变更不会触发部署
      - README.md
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # 升级到 v4
        with:
          version: 8.6.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # 优化：开启 pnpm 缓存，加快构建速度

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run docs:build

      - name: Action-Deploy
        uses: peaceiris/actions-gh-pages@v4 # 核心修改：升级到 v4 解决 Node 警告
        with:
          github_token: ${{ secrets.MY_ELEMENT_SECRET }}
          BRANCH: gh-pages
          publish_dir: ./docs/dist
          commit_message: "自动化部署"
